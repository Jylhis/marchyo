on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  lints:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: jylhis
          skipPush: true
      - run: nix fmt -- --ci
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: jylhis
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix flake check
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Check nixpkgs rev sync
        run: |
          FLAKE_REV=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock)
          DEVENV_REV=$(jq -r '.nodes.nixpkgs.locked.rev' devenv.lock)
          echo "flake:  $FLAKE_REV"
          echo "devenv: $DEVENV_REV"
          if [ "$FLAKE_REV" != "$DEVENV_REV" ]; then
            echo "::error::nixpkgs revs diverged across lock files"
            exit 1
          fi
          echo "All locks pinned to $FLAKE_REV"
  build:
    runs-on: ubuntu-latest
    needs: [lints, check, verify]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: jylhis
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build toplevel
        run: nix build .#nixosConfigurations.default.config.system.build.toplevel
