name: nixpkgs search index
# Rebuilds the nixpkgs package search index from marchyo's pinned nixpkgs and
# loads it into the Cloudflare D1 database `marchyo-nixpkgs`, which backs the
# /api/packages route of the site Worker (the "nixpkgs" tab of /search/).
#
# Requires two repository secrets:
#   CLOUDFLARE_API_TOKEN   — token with D1 edit permission
#   CLOUDFLARE_ACCOUNT_ID  — the Cloudflare account id
# Provision the database once before the first run:
#   cd site && bunx wrangler d1 create marchyo-nixpkgs
# then paste the returned database_id into site/wrangler.jsonc.
on:
  schedule:
    # Weekly, Monday 05:00 UTC. Align roughly with flake.lock nixpkgs bumps so
    # the index tracks what consumers actually get.
    - cron: "0 5 * * 1"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: nixpkgs-index
  cancel-in-progress: false
jobs:
  build-and-load:
    name: Build + load D1 index
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: jylhis
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: oven-sh/setup-bun@v2
      - name: Build nixpkgs index SQL
        run: site/scripts/build-nixpkgs-index.sh x86_64-linux site/scripts/nixpkgs.sql
      - name: Install site deps (wrangler)
        working-directory: site
        run: bun install --frozen-lockfile
      - name: Load into D1 (remote)
        working-directory: site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler d1 execute marchyo-nixpkgs --remote --yes --file scripts/nixpkgs.sql
