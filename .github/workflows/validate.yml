name: Validate
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
permissions:
  contents: read
jobs:
  lint:
    name: Lint & verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Format check
        run: nix fmt -- --ci
      - name: Verify lock-file rev sync
        run: |
          set -euo pipefail
          INPUTS=$(awk '/^inputs:$/{f=1;next} f && /^[^ ]/{f=0} f && /^  [A-Za-z0-9_-]+:$/{gsub(/[ :]/,""); print}' devenv.yaml)
          fail=0
          for name in $INPUTS; do
            FLAKE_REV=$(jq -er --arg n "$name" '.nodes[$n].locked.rev' flake.lock) \
              || { echo "::error::$name missing from flake.lock"; fail=1; continue; }
            DEVENV_REV=$(jq -er --arg n "$name" '.nodes[$n].locked.rev' devenv.lock) \
              || { echo "::error::$name missing from devenv.lock"; fail=1; continue; }
            echo "$name: flake=$FLAKE_REV devenv=$DEVENV_REV"
            if [ "$FLAKE_REV" != "$DEVENV_REV" ]; then
              echo "::error::$name rev diverged across lock files"
              fail=1
            fi
          done
          [ "$fail" = 0 ] || exit 1
          echo "All shared inputs pinned in sync."
  # Fast PR gate: x86_64-linux eval-only checks. Runs on every PR and main push.
  check:
    name: Check (x86_64-linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: jylhis
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix flake check --accept-flake-config
  # aarch64-linux eval coverage. Main-only — rarely diverges from x86_64 and
  # would otherwise waste a runner on every PR push.
  check-arm:
    name: Check (aarch64-linux)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: jylhis
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix flake check --accept-flake-config
  # Full NixOS toplevel build. Main-only — up to 60 minutes per run.
  build:
    name: Build toplevel
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [lint, check]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: jylhis
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build toplevel
        run: nix build --accept-flake-config .#nixosConfigurations.x86_64.config.system.build.toplevel
